# Requires contributors to sign CLA.md before PRs can pass the CLA check.
# Signatures are stored in this repo under .github/cla-signatures/.
#
# Note: the action commits signature updates to `main`. If branch protection
# blocks GITHUB_TOKEN, either allow the workflow, or store signatures in a
# separate private repo via remote-organization-name / remote-repository-name
# + PERSONAL_ACCESS_TOKEN.
name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: .github/cla-signatures/v1/cla.json
          path-to-document: https://github.com/nacusiancii/vajra-v2/blob/main/CLA.md
          branch: main
          # Maintainer only for now. Add entries (e.g. dependabot[bot], or
          # *[bot] for GitHub App bots) when an external bot actually opens PRs.
          allowlist: nacusiancii
          lock-pullrequest-aftermerge: false
