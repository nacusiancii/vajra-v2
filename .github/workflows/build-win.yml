# Windows installer on a real win32 runner (native modules cannot be cross-built
# from Linux). Also called by release-alpha — GITHUB_TOKEN tag pushes do not
# start other workflows, so alphas invoke this via workflow_call.
name: build-win

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA (default: triggering ref)'
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: 'Branch, tag, or SHA (default: triggering ref)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        # postinstall rebuilds native modules for the Windows/Electron ABI
        run: pnpm install --frozen-lockfile

      - name: Version for artifact name
        id: meta
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Windows installer
        run: pnpm build:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: vajra-windows-installer-${{ steps.meta.outputs.version }}
          path: |
            dist/*-setup.exe
            dist/*-setup.exe.blockmap
          if-no-files-found: error
