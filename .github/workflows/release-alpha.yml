# Manual alpha cut: bump package.json on main, tag, build Windows installer.
# Calls build-win directly — GITHUB_TOKEN tag pushes do not start other workflows.
name: release-alpha

on:
  workflow_dispatch:

concurrency:
  group: release-alpha
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Bump, commit, tag, push
        id: bump
        run: |
          set -euo pipefail
          version=$(node scripts/bump-alpha-version.mjs)
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${version}"
          git tag "$tag"
          git push origin HEAD:main "$tag"

  build:
    needs: bump
    uses: ./.github/workflows/build-win.yml
    with:
      ref: v${{ needs.bump.outputs.version }}
