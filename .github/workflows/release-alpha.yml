# Cut a new alpha: bump package.json, land it on main, tag, then build Windows.
#
# Manual only (workflow_dispatch). First run from 1.0.0 → 1.0.0-alpha.1; later
# runs increment the alpha counter.
#
# GITHUB_TOKEN commits/tags do not trigger other workflows, so this calls
# build-win via workflow_call instead of relying on the tag push alone.
name: release-alpha

on:
  workflow_dispatch:

concurrency:
  group: release-alpha
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Full history so push is less surprising if main moved; not strictly required.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Bump alpha version
        id: bump
        run: node scripts/bump-alpha-version.mjs

      - name: Commit, tag, and push to main
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          git commit -m "chore(release): ${VERSION}"
          git tag "$TAG"

          git push origin HEAD:main
          git push origin "$TAG"

          echo "Released ${TAG} on main (version ${VERSION})"

  build:
    needs: bump
    uses: ./.github/workflows/build-win.yml
    with:
      ref: ${{ needs.bump.outputs.tag }}
